name: Publish to pub.dev

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[pub bump]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version if tag already exists
        id: bump
        run: |
          set -e
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version: //')
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists. Bumping patch version..."
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            {
              echo "## $NEW_VERSION"
              echo ""
              echo "- Automated patch bump."
              echo ""
              cat CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
            git add pubspec.yaml CHANGELOG.md
            git commit -m "chore: bump version to $NEW_VERSION [pub bump]"
            git push origin main
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Create version tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish to pub.dev
        run: flutter pub publish --force
